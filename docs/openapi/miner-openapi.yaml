    post:
      summary: Store an embedding and return its CID
      description: Sent by validators/clients to persist either raw text (the miner embeds it) or a pre-computed
        embedding vector. Returns a content identifier that can be used for retrieval and Merkle inclusion
        proofs.
      tags:
      - Synapses
      operationId: post_IngestSynapse
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '401':
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - EngramHotkeySignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
  /QuerySynapse:
