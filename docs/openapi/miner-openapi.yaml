components:
  securitySchemes:
    EngramHotkeySignature:
      type: apiKey
      in: body
      name: signature
      description: "**Bittensor sr25519 signed-challenge scheme.**\n\nThree fields are added to the request\
        \ body:\n\n```json\n{\n  \"hotkey\":    \"5F...\",          // SS58 of the signing keypair\n \
        \ \"nonce\":     1712345678123,    // unix ms — replay protection (±30 s)\n  \"signature\": \"\
        0xabc123...\",   // hex sr25519 sig over canonical message\n  ...payload...\n}\n```\n\n**Canonical\
        \ message** (UTF-8 bytes):\n\n```python\nf\"{nonce}:{endpoint}:{body_hash}\"\n```\n\nwhere:\n\n\
        - ``endpoint`` is the URL path *with* the leading slash (e.g. ``/IngestSynapse``)\n- ``body_hash\
        \ = SHA256(``\n  ``json.dumps(payload, sort_keys=True, separators=(',', ':'), default=str)``\n\
        \  ``)`` — i.e. the hash of the JSON-serialised payload, *excluding* ``hotkey``/``nonce``/``signature``\
        \ themselves, keys sorted lexicographically.\n\n**Replay window:** ``|now_ms - nonce| <= 30_000``\n\
        \n**Operator policy** (env vars, see ``engram/miner/auth.py``):\n\n- ``REQUIRE_HOTKEY_SIG=true``\
        \ — reject unsigned requests (mainnet default)\n- ``ALLOWED_VALIDATOR_HOTKEYS=5F...,5G...`` —\
        \ strict allowlist\n- ``REQUIRE_METAGRAPH_REG=true`` — reject unregistered hotkeys"
  schemas:
    AuthFields:
      type: object
      description: Optional fields. When ``REQUIRE_HOTKEY_SIG=true`` (mainnet default), all three are
        required. See the ``EngramHotkeySignature`` security scheme.
      properties:
        hotkey:
          type: string
          description: SS58 address of the signing keypair (Bittensor hotkey).
          example: 5GrwvaEF5zXb26Fz9rcQpDWS57CtERHpNehXCPcNoHGKutQY
        nonce:
          type: integer
          format: int64
          description: Unix ms timestamp. Must be within ±30 s of server time.
        signature:
          type: string
          description: 'Hex sr25519 signature (with or without 0x prefix) over the canonical message:
            ``f"{nonce}:{endpoint}:{body_hash}"`` where ``body_hash = SHA256(JSON(payload_fields_sorted))``.'
          example: 0xdeadbeef...
    IngestRequest:
      type: object
      description: Body fields for POST /IngestSynapse.
      allOf:
      - $ref: '#/components/schemas/AuthFields'
      - type: object
        properties:
          text:
            type: string
            nullable: true
            description: Raw text to embed. Mutually exclusive with raw_embedding.
          raw_embedding:
            type: array
            items:
              type: number
              format: float
            nullable: true
            description: Pre-computed 1536-d embedding vector (skips embedder).
          metadata:
            type: object
            additionalProperties: true
            description: Arbitrary key-value metadata stored alongside the vector.
          model_version:
            type: string
            default: v1
            description: Subnet model epoch version for CID generation.
          namespace:
            type: string
            nullable: true
            description: Private collection name (omit for public memories).
          namespace_hotkey:
            type: string
            nullable: true
            description: Bittensor SS58 hotkey that owns this namespace.
          namespace_sig:
            type: string
            nullable: true
            description: sr25519 hex signature over 'engram-ns:{namespace}:{namespace_timestamp_ms}'.
          namespace_timestamp_ms:
            type: integer
            format: int64
            nullable: true
            description: Unix ms timestamp for namespace_sig replay prevention (±60 s).
          namespace_key:
            type: string
            nullable: true
            deprecated: true
            description: '[Deprecated] Legacy shared secret. Use namespace_sig instead.'
    IngestResponse:
      type: object
      properties:
        cid:
          type: string
          nullable: true
          description: Content identifier. ``null`` on failure.
          example: v1::a3f2b1c9...
        error:
          type: string
          nullable: true
          description: Error message on failure.
    QueryRequest:
      type: object
      description: Body fields for POST /QuerySynapse.
      allOf:
      - $ref: '#/components/schemas/AuthFields'
      - type: object
        properties:
          query_text:
            type: string
            nullable: true
          query_vector:
            type: array
            items:
              type: number
              format: float
            nullable: true
          top_k:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          namespace:
            type: string
            nullable: true
          namespace_hotkey:
            type: string
            nullable: true
          namespace_sig:
            type: string
            nullable: true
          namespace_timestamp_ms:
            type: integer
            format: int64
            nullable: true
          namespace_key:
            type: string
            nullable: true
            deprecated: true
          filter:
            type: object
            additionalProperties:
              type: string
            description: Metadata key/value filter (AND match) applied post-ANN.
    QueryResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              cid:
                type: string
              score:
                type: number
                format: float
              metadata:
                type: object
                additionalProperties: true
        latency_ms:
          type: number
          format: float
          nullable: true
        error:
          type: string
          nullable: true
    ChallengeRequest:
      type: object
      allOf:
      - $ref: '#/components/schemas/AuthFields'
      - type: object
        required:
        - cid
        - nonce_hex
        - expires_at
        properties:
          cid:
            type: string
            description: CID to prove storage of.
          nonce_hex:
            type: string
            description: 32-byte random nonce as hex.
          expires_at:
            type: integer
            format: int64
            description: Unix seconds.
          validator_hotkey_hex:
            type: string
            description: Validator's hotkey (raw 32-byte hex). Binds the HMAC key.
    ChallengeResponse:
      type: object
      properties:
        embedding_hash:
          type: string
          description: SHA-256 of stored embedding bytes.
        proof:
          type: string
          description: HMAC-SHA256(nonce || embedding_hash).
    RepairRequest:
      type: object
      allOf:
      - $ref: '#/components/schemas/AuthFields'
      - type: object
        required:
        - cid
        properties:
          cid:
            type: string
    RepairResponse:
      type: object
      properties:
        cid:
          type: string
        embedding:
          type: array
          items:
            type: number
            format: float
        metadata:
          type: object
          additionalProperties: true
    RetrieveResponse:
      type: object
      properties:
        cid:
          type: string
        metadata:
          type: object
          additionalProperties: true
    DeleteRequest:
      type: object
      allOf:
      - $ref: '#/components/schemas/AuthFields'
      - type: object
        properties:
          namespace:
            type: string
            nullable: true
          namespace_hotkey:
            type: string
            nullable: true
          namespace_sig:
            type: string
            nullable: true
          namespace_timestamp_ms:
            type: integer
            format: int64
            nullable: true
    DeleteResponse:
      type: object
      properties:
        deleted:
          type: boolean
        cid:
          type: string
    ListRequest:
      type: object
      allOf:
      - $ref: '#/components/schemas/AuthFields'
      - type: object
        properties:
          filter:
            type: object
            additionalProperties:
              type: string
            description: Metadata key/value pairs (AND match).
          limit:
            type: integer
            default: 50
            maximum: 200
          offset:
            type: integer
            default: 0
            minimum: 0
          namespace:
            type: string
            default: __public__
          namespace_hotkey:
            type: string
            nullable: true
          namespace_sig:
            type: string
            nullable: true
          namespace_timestamp_ms:
            type: integer
            format: int64
            nullable: true
    ListResponse:
      type: object
      properties:
        records:
          type: array
          items:
            type: object
            additionalProperties: true
        count:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
    CommitmentResponse:
      type: object
      properties:
        root_hex:
          type: string
