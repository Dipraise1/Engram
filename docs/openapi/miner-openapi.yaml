          type: string
        owner_hotkey:
          type: string
          description: SS58 Bittensor hotkey.
        signature:
          type: string
          description: Hex sr25519 signature.
        timestamp_ms:
          type: integer
          format: int64
    AttestResponse:
      type: object
      properties:
